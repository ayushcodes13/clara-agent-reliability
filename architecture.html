<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clara Agent Reliability – Architecture</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #fff;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            padding: 32px 16px 48px;
        }

        svg text {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
    </style>
</head>

<body>
    <svg viewBox="0 0 860 1110" width="860" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
                <path d="M0,0 L0,6 L8,3 z" fill="#6b7280" />
            </marker>
            <marker id="arr-dash" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
                <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8" />
            </marker>
        </defs>

        <!-- Background -->
        <rect width="860" height="1110" fill="#ffffff" />

        <!-- ══ TITLE ══ -->
        <text x="430" y="32" text-anchor="middle" font-size="17" font-weight="600" fill="#1e3a5f">Clara Agent
            Reliability: Safety-First Recommendation Flow</text>
        <line x1="60" y1="46" x2="800" y2="46" stroke="#cbd5e1" stroke-width="1" />

        <!-- ══ MAIN PIPELINE ══ -->

        <!-- 1. User Query -->
        <rect x="310" y="62" width="240" height="42" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.8" />
        <text x="430" y="88" text-anchor="middle" font-size="14" font-weight="600" fill="#1e3a5f">User Query</text>

        <!-- Arrow 1→2 -->
        <line x1="430" y1="104" x2="430" y2="137" stroke="#6b7280" stroke-width="1.8" marker-end="url(#arr)" />

        <!-- 2. Router -->
        <rect x="310" y="140" width="240" height="72" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.8" />
        <text x="430" y="162" text-anchor="middle" font-size="14" font-weight="600" fill="#1e3a5f">Router</text>
        <text x="430" y="180" text-anchor="middle" font-size="11" fill="#4b5563">detects skincare / haircare</text>
        <text x="430" y="198" text-anchor="middle" font-size="11" fill="#4b5563">or high-risk medical context</text>

        <!-- Arrow 2→3 -->
        <line x1="430" y1="212" x2="430" y2="245" stroke="#6b7280" stroke-width="1.8" marker-end="url(#arr)" />

        <!-- 3. Retriever -->
        <rect x="310" y="248" width="240" height="72" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.8" />
        <text x="430" y="270" text-anchor="middle" font-size="14" font-weight="600" fill="#1e3a5f">Retriever</text>
        <text x="430" y="288" text-anchor="middle" font-size="11" fill="#4b5563">searches product catalogue</text>
        <text x="430" y="306" text-anchor="middle" font-size="11" fill="#4b5563">ranks relevant products</text>

        <!-- Arrow 3→4 -->
        <line x1="430" y1="320" x2="430" y2="353" stroke="#6b7280" stroke-width="1.8" marker-end="url(#arr)" />

        <!-- 4. Grounding Layer -->
        <rect x="310" y="356" width="240" height="72" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.8" />
        <text x="430" y="378" text-anchor="middle" font-size="14" font-weight="600" fill="#1e3a5f">Grounding
            Layer</text>
        <text x="430" y="396" text-anchor="middle" font-size="11" fill="#4b5563">allows only claims in product
            metadata</text>
        <text x="430" y="414" text-anchor="middle" font-size="11" fill="#4b5563">prevents invented product
            benefits</text>

        <!-- Arrow 4→5 -->
        <line x1="430" y1="428" x2="430" y2="461" stroke="#6b7280" stroke-width="1.8" marker-end="url(#arr)" />

        <!-- 5. Risk Rules -->
        <rect x="310" y="464" width="240" height="72" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.8" />
        <text x="430" y="486" text-anchor="middle" font-size="14" font-weight="600" fill="#1e3a5f">Risk Rules</text>
        <text x="430" y="504" text-anchor="middle" font-size="11" fill="#4b5563">checks risk factors ·
            contraindications</text>
        <text x="430" y="522" text-anchor="middle" font-size="11" fill="#4b5563">user context (pregnancy,
            infection)</text>

        <!-- Arrow 5→6 -->
        <line x1="430" y1="536" x2="430" y2="569" stroke="#6b7280" stroke-width="1.8" marker-end="url(#arr)" />

        <!-- 6. Doctor Review Decision (amber — decision node) -->
        <rect x="310" y="572" width="240" height="72" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.8" />
        <text x="430" y="594" text-anchor="middle" font-size="14" font-weight="600" fill="#78350f">Doctor Review
            Decision</text>
        <text x="430" y="612" text-anchor="middle" font-size="11" fill="#92400e">safe to show</text>
        <text x="430" y="630" text-anchor="middle" font-size="11" fill="#92400e">or doctor review required</text>

        <!-- Arrow 6→7 -->
        <line x1="430" y1="644" x2="430" y2="677" stroke="#6b7280" stroke-width="1.8" marker-end="url(#arr)" />

        <!-- 7. Response Builder -->
        <rect x="310" y="680" width="240" height="72" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.8" />
        <text x="430" y="702" text-anchor="middle" font-size="14" font-weight="600" fill="#1e3a5f">Response
            Builder</text>
        <text x="430" y="720" text-anchor="middle" font-size="11" fill="#4b5563">creates user-facing safe
            response</text>
        <text x="430" y="738" text-anchor="middle" font-size="11" fill="#4b5563">grounded claims + risk flags</text>

        <!-- Arrow 7→8 -->
        <line x1="430" y1="752" x2="430" y2="785" stroke="#6b7280" stroke-width="1.8" marker-end="url(#arr)" />

        <!-- 8. Trace Logger (indigo — logging tier) -->
        <rect x="310" y="788" width="240" height="60" rx="4" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.8" />
        <text x="430" y="810" text-anchor="middle" font-size="14" font-weight="600" fill="#312e81">Trace Logger</text>
        <text x="430" y="830" text-anchor="middle" font-size="11" fill="#4338ca">logs route, products, decisions,
            pipeline steps</text>

        <!-- Arrow 8→9 -->
        <line x1="430" y1="848" x2="430" y2="881" stroke="#6b7280" stroke-width="1.8" marker-end="url(#arr)" />

        <!-- 9. Feedback Logger (indigo — logging tier) -->
        <rect x="310" y="884" width="240" height="60" rx="4" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.8" />
        <text x="430" y="906" text-anchor="middle" font-size="14" font-weight="600" fill="#312e81">Feedback
            Logger</text>
        <text x="430" y="926" text-anchor="middle" font-size="11" fill="#4338ca">writes to feedback_log.csv for
            review</text>

        <!-- ══ LEFT SIDEBAR – Product Catalogue ══ -->
        <text x="140" y="318" text-anchor="middle" font-size="9.5" letter-spacing="1" fill="#94a3b8"
            font-weight="600">DATA SOURCE</text>
        <rect x="44" y="326" width="192" height="130" rx="4" fill="#f8fafc" stroke="#64748b" stroke-width="1.4"
            stroke-dasharray="5,3" />
        <text x="140" y="349" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">Product Catalogue
            JSON</text>
        <!-- small divider -->
        <line x1="60" y1="356" x2="220" y2="356" stroke="#e2e8f0" stroke-width="1" />
        <text x="140" y="373" text-anchor="middle" font-size="11" fill="#64748b">product_catalogue.json</text>
        <text x="140" y="391" text-anchor="middle" font-size="11" fill="#64748b">metadata · benefit claims</text>
        <text x="140" y="409" text-anchor="middle" font-size="11" fill="#64748b">contraindications</text>
        <text x="140" y="427" text-anchor="middle" font-size="11" fill="#64748b">ingredient flags</text>

        <!-- Dashed arrows from Product Catalogue to Retriever, Grounding, Risk Rules -->
        <!-- → Retriever (center y≈284, left edge x=310) -->
        <line x1="236" y1="354" x2="310" y2="284" stroke="#94a3b8" stroke-width="1.1" stroke-dasharray="4,3"
            marker-end="url(#arr-dash)" />
        <!-- → Grounding Layer (center y≈392, left edge x=310) -->
        <line x1="236" y1="390" x2="310" y2="392" stroke="#94a3b8" stroke-width="1.1" stroke-dasharray="4,3"
            marker-end="url(#arr-dash)" />
        <!-- → Risk Rules (center y≈500, left edge x=310) -->
        <line x1="236" y1="426" x2="310" y2="500" stroke="#94a3b8" stroke-width="1.1" stroke-dasharray="4,3"
            marker-end="url(#arr-dash)" />

        <!-- ══ RIGHT SIDEBAR – Audit Trail ══ -->
        <text x="714" y="798" text-anchor="middle" font-size="9.5" letter-spacing="1" fill="#94a3b8"
            font-weight="600">OUTPUT</text>
        <rect x="616" y="806" width="192" height="130" rx="4" fill="#f8fafc" stroke="#64748b" stroke-width="1.4"
            stroke-dasharray="5,3" />
        <text x="712" y="829" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">Audit Trail</text>
        <text x="712" y="847" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">+ Feedback Log</text>
        <line x1="632" y1="854" x2="792" y2="854" stroke="#e2e8f0" stroke-width="1" />
        <text x="712" y="871" text-anchor="middle" font-size="11" fill="#64748b">trace.json</text>
        <text x="712" y="889" text-anchor="middle" font-size="11" fill="#64748b">feedback_log.csv</text>
        <text x="712" y="907" text-anchor="middle" font-size="11" fill="#64748b">pipeline step snapshots</text>
        <text x="712" y="925" text-anchor="middle" font-size="11" fill="#64748b">(review artefacts)</text>

        <!-- Dashed arrows from Trace Logger and Feedback Logger to Audit Trail -->
        <!-- Trace Logger right edge (550) center y ≈ 818 → Audit Trail left edge (616) -->
        <line x1="550" y1="818" x2="616" y2="840" stroke="#94a3b8" stroke-width="1.1" stroke-dasharray="4,3"
            marker-end="url(#arr-dash)" />
        <!-- Feedback Logger right edge (550) center y ≈ 914 → Audit Trail left edge (616) -->
        <line x1="550" y1="914" x2="616" y2="890" stroke="#94a3b8" stroke-width="1.1" stroke-dasharray="4,3"
            marker-end="url(#arr-dash)" />

        <!-- ══ LEGEND ══ -->
        <rect x="44" y="884" width="192" height="90" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" />
        <text x="140" y="903" text-anchor="middle" font-size="10" font-weight="600" fill="#64748b"
            letter-spacing="0.5">LEGEND</text>
        <rect x="60" y="912" width="14" height="10" rx="2" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.4" />
        <text x="82" y="922" font-size="10" fill="#4b5563">Pipeline step</text>
        <rect x="60" y="930" width="14" height="10" rx="2" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.4" />
        <text x="82" y="940" font-size="10" fill="#4b5563">Decision node</text>
        <rect x="60" y="948" width="14" height="10" rx="2" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.4" />
        <text x="82" y="958" font-size="10" fill="#4b5563">Logging tier</text>
        <line x1="60" y1="968" x2="74" y2="968" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2" />
        <text x="82" y="972" font-size="10" fill="#4b5563">External data / output</text>

        <!-- ══ FOOTER ══ -->
        <line x1="60" y1="1082" x2="800" y2="1082" stroke="#e2e8f0" stroke-width="1" />
        <text x="430" y="1100" text-anchor="middle" font-size="10.5" fill="#9ca3af">3-hour backend reliability demo —
            not a production medical system.</text>
    </svg>
</body>

</html>
